<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="https://assets.dapdap.net/stableflow/logos/logo-stableflow.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StableFlow: Move Stablecoins at Scale | Fast, Secure, and Built for Size.</title>
  <meta name="description" content="Move stablecoins across 12+ chains with 1-click, near 1:1 transfers. Low fees (1 bps), atomic security, and support for USDT & USDC. No KYC. Start your transfer today.">
  <style>
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
    @keyframes breathing {
      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
      <img
        src="https://assets.dapdap.net/stableflow/logos/logo-stableflow.svg"
        alt="Loading"
        style="width: 120px; height: 120px; animation: breathing 2s ease-in-out infinite;" 
      />
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
